services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clocks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clocks}
      POSTGRES_DB: ${POSTGRES_DB:-clocks}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clocks} -d ${POSTGRES_DB:-clocks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000" # S3 API (must match MINIO_PUBLIC_ENDPOINT for presigned URLs)
      - "9001:9001" # MinIO web console

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      HTTP_PORT: "8080"
      APP_LOGIN: ${APP_LOGIN:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-clocks2026!}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgres://clocks:clocks@postgres:5432/clocks?sslmode=disable}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-videos}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      IMANATOR_API_KEY: ${IMANATOR_API_KEY:-}
      IMANATOR_BASE_URL: ${IMANATOR_BASE_URL:-https://imanator.pro}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-google/veo-3.1}
      OPENROUTER_PROXY_URL: ${OPENROUTER_PROXY_URL:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-2}
      STAGE_TIMEOUT_SECONDS: ${STAGE_TIMEOUT_SECONDS:-600}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pgdata:
  miniodata:
